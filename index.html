<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VillaNova</title>
    <link rel="stylesheet" href="main.css">
    <script src="/api-openagenda.js" defer></script>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">VillaNova</a>
            <form action="" role="search" class="search-form">
                <input type="search" placeholder="Rechercher un événement..." aria-label="Rechercher un événement">
            </form>
            <nav class="main-nav" aria-label="Navigation principale">
                <ul>
                    <li><a href="index.html">Agenda</a></li>
                    <li><a href="">Carte</a></li>
                    <li><a href="">Mon profil</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <figure class="hero-figure">
                <picture>
                    <source media="(max-width: 768px)" type="image/webp" srcset="https://placehold.co/800x400/164A3B/FFF?text=Hero+Mobile">
                    <source media="(min-width: 769px)" type="image/webp" srcset="https://placehold.co/1200x500/164A3B/FFF?text=Hero+Desktop">
                    <img src="https://placehold.co/1200x500/164A3B/FFF" alt="Image de l'événement à la une" loading="lazy">
                </picture>
                <div class="hero-content">
                    <span class="hero-tag">À la une</span>
                    <h2 class="hero-title">Festival des Arts</h2>
                    <p class="hero-date">Du 10 au 15 Juillet</p>
                    <a href="event-detail.html" class="btn-secondary">Découvrir</a>
                </div>
            </figure>
        </section>

        <section class="events-section">
            <nav class="filters-nav" aria-label="Filtres des événements">
                <ul>
                    <li><a href="" class="active">Tous</a></li>
                    <li><a href="">Concerts</a></li>
                    <li><a href="">Théâtre</a></li>
                    <li><a href="">Expositions</a></li>
                    <li><a href="">Gratuit</a></li>
                </ul>
            </nav>

            <div class="events-grid" id="events-container">
                <!-- events are injected dynamically here using JS -->
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-box">
                <h3>Navigation</h3>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="">Evénements</a></li>
                    <li><a href="">A propos</a></li>
                </ul>
            </div>
            <div class="footer-box">
                <h3>Contact</h3>
                <ul>
                    <li><a href="">Support</a></li>
                    <li><a href="">Partenaires</a></li>
                </ul>
            </div>
            <div class="footer-box">
                <h3>Suivez-nous</h3>
                <ul class="social-links">
                    <li><a href="#">Facebook</a></li>
                    <li><a href="#">Instagram</a></li>
                    <li><a href="#">Twitter</a></li>
                </ul>
            </div>
        </div>
    </footer>
</body>

</html>
